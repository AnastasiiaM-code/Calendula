<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Календарь"/>
<meta name="theme-color" content="#ffffff"/>
<title>Мой календарь</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap');
:root{
  --bg:#ffffff;--bg2:#f7f5f2;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --accent:#8B6A4A;--accent-fg:#F5EDE0;
  --radius:10px;--radius-lg:14px;
  --cell:14.2857%;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overscroll-behavior:none;}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.app{max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100vh;height:100dvh;}
.topbar{display:flex;align-items:center;padding:0 0.85rem;border-bottom:0.5px solid var(--border);gap:2px;flex-shrink:0;background:var(--bg);z-index:10;}
.app-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--text);margin-right:auto;padding:0.7rem 0.25rem 0.7rem 0;}
.tbtn{background:none;border:none;cursor:pointer;padding:0.6rem 0.55rem;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;color:var(--text3);margin-bottom:-0.5px;}
.tbtn:active{opacity:0.5;}
.tbtn.on{color:var(--text);border-bottom-color:var(--text);}
.tbtn.plus{color:var(--accent);}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.month-block{padding:0 0 1.2rem;}
.month-block+.month-block{border-top:0.5px solid var(--border);}
.monlabel{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--text);padding:0.8rem 1rem 0.4rem;display:block;}
 
/* calendar grid */
.wdrow{display:grid;grid-template-columns:repeat(7,1fr);padding:0 0.5rem;gap:0;}
.wd{font-size:10px;text-align:center;color:var(--text3);letter-spacing:0.3px;text-transform:uppercase;padding:3px 0;}
 
/* grid wrapper — relative so we can overlay bars */
.cal-wrap{position:relative;padding:0 0.5rem;}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;}
.dc{height:52px;border-radius:6px;padding:5px 3px 0;cursor:pointer;position:relative;}
.dc:active{background:var(--bg2);}
.dn{font-size:11px;color:var(--text2);text-align:center;line-height:1;}
.dc.today .dn{color:var(--accent);font-weight:500;}
.today-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin:2px auto 0;}
 
/* event bars overlay — rendered as absolutely positioned divs over the grid */
.bars-overlay{position:absolute;top:0;left:0.5rem;right:0.5rem;pointer-events:none;}
.ev-bar-row{position:absolute;height:13px;border-radius:3px;font-size:8px;line-height:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;pointer-events:all;cursor:pointer;}
.ev-bar-row.maybe{background:transparent!important;border:1px dashed currentColor;opacity:0.5;}
.ev-bar-row.start{border-radius:4px 0 0 4px;}
.ev-bar-row.end{border-radius:0 4px 4px 0;}
.ev-bar-row.mid{border-radius:0;}
.ev-bar-row.single{border-radius:4px;}
 
/* event pills */
.ev-strip{padding:4px 0.75rem 0;display:flex;flex-wrap:wrap;gap:4px;}
.ev-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;}
.ev-pill:active{opacity:0.7;}
.ev-pill.maybe{opacity:0.55;border-style:dashed!important;}
 
/* list */
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);padding:0.9rem 1rem 0.35rem;}
.evlist{padding:0 1rem 1rem;}
.ev-row{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:5px;}
.ev-col{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ev-body{flex:1;min-width:0;}
.ev-nm{font-size:13px;color:var(--text);font-weight:500;}
.ev-mt{font-size:11px;color:var(--text3);margin-top:2px;}
.ev-del{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:0 2px;line-height:1;}
.badge{font-size:9px;background:var(--bg2);color:var(--text3);padding:1px 5px;border-radius:10px;margin-left:4px;vertical-align:middle;}
.maybe-badge{font-size:9px;color:var(--text3);padding:1px 5px;border-radius:10px;margin-left:4px;vertical-align:middle;border:1px dashed var(--text3);}
.empty{font-size:12px;color:var(--text3);padding:0.5rem 0;}
 
/* sheet */
.overlay{background:rgba(0,0,0,0.4);position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg);border-radius:18px 18px 0 0;padding:1rem 1.25rem;padding-bottom:calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-width:430px;border-top:0.5px solid var(--border2);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1rem;}
.sh-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--text);margin-bottom:1rem;}
.fl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);display:block;margin-bottom:5px;}
.fg{margin-bottom:12px;}
.finput{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius);padding:9px 11px;font-size:15px;background:var(--bg2);color:var(--text);font-family:'Inter',sans-serif;-webkit-appearance:none;}
.finput:focus{outline:none;border-color:var(--accent);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:0.5px solid var(--border);}
.toggle-label{font-size:14px;color:var(--text);}
.toggle-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.toggle{width:44px;height:26px;border-radius:13px;background:var(--border2);position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;border:none;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(18px);}
.mini-cal{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:6px;}
.mc-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:0.5px solid var(--border);}
.mc-lbl{font-size:13px;font-weight:500;color:var(--text);}
.mc-arr{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2);padding:2px 8px;border-radius:6px;}
.mc-arr:active{background:var(--bg2);}
.mc-wd{display:grid;grid-template-columns:repeat(7,1fr);padding:5px 4px 2px;}
.mc-wdc{font-size:9px;text-align:center;color:var(--text3);text-transform:uppercase;padding:2px 0;}
.mc-days{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 4px 8px;gap:2px;}
.mc-d{height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);cursor:pointer;}
.mc-d:active{opacity:0.7;}
.mc-d.sel{color:#fff;font-weight:500;}
.mc-d.today-d{color:var(--accent);font-weight:500;}
.mc-d.empty{cursor:default;}
.date-display{font-size:12px;color:var(--text2);min-height:18px;margin-top:3px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid transparent;}
.chip:active{opacity:0.7;}
.rrow{display:flex;gap:6px;flex-wrap:wrap;}
.ropt{padding:6px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--border2);color:var(--text2);background:none;font-family:'Inter',sans-serif;}
.ropt:active{opacity:0.7;}
.ropt.on{background:var(--bg2);border-color:var(--text2);color:var(--text);font-weight:500;}
.dow-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.dow-pill{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1.5px solid var(--border2);color:var(--text2);background:none;font-family:'Inter',sans-serif;}
.mbtns{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.bsave{flex:1;padding:12px;background:var(--accent);color:var(--accent-fg);border:none;border-radius:var(--radius);font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;}
.bsave:active{opacity:0.85;}
.bcancel{padding:12px 16px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:15px;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif;}
.cat-mgr-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.cswatch{width:22px;height:22px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent;}
.cswatch.open{border-color:var(--text2);}
.cname{flex:1;border:none;background:none;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;padding:2px 4px;}
.cname:focus{outline:none;background:var(--bg2);border-radius:4px;}
.cdel{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:0 2px;}
.cprow{display:flex;flex-wrap:wrap;gap:7px;padding:5px 0 10px 30px;}
.cpdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.cpdot.on{border-color:var(--text);}
.addcatbtn{display:flex;align-items:center;gap:6px;background:none;border:0.5px dashed var(--border2);border-radius:var(--radius);padding:8px 12px;width:100%;cursor:pointer;font-size:13px;color:var(--text2);font-family:'Inter',sans-serif;margin-top:8px;}
.bdanger{flex:1;padding:12px;background:none;border:0.5px solid #E57373;border-radius:var(--radius);font-size:15px;cursor:pointer;color:#E57373;font-family:'Inter',sans-serif;}
.bdanger:active{background:#fdecea;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="app-title">мой календарь</span>
    <button class="tbtn on" id="tb-cal" onclick="setTab('cal')">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="14" height="13" rx="2"/><line x1="2" y1="7" x2="16" y2="7"/><line x1="6" y1="1.5" x2="6" y2="4.5"/><line x1="12" y1="1.5" x2="12" y2="4.5"/></svg>
    </button>
    <button class="tbtn" id="tb-list" onclick="setTab('list')">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6" y1="5" x2="15" y2="5"/><line x1="6" y1="9" x2="15" y2="9"/><line x1="6" y1="13" x2="15" y2="13"/><circle cx="3" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="9" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="13" r="1" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="tbtn" onclick="showPanel('cats')">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="5" r="2.2"/><circle cx="13" cy="5" r="2.2"/><circle cx="5" cy="13" r="2.2"/><circle cx="13" cy="13" r="2.2"/></svg>
    </button>
    <button class="tbtn plus" onclick="showPanel('add',{})">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="9" y1="3" x2="9" y2="15"/><line x1="3" y1="9" x2="15" y2="9"/></svg>
    </button>
  </div>
  <div class="scroll-area">
    <div id="viewCal"></div>
    <div id="viewList" style="display:none;">
      <div class="sec-label">все события</div>
      <div class="evlist" id="evListAll"></div>
    </div>
  </div>
</div>
<div id="overlay" class="overlay" style="display:none;" onclick="overlayClick(event)">
  <div class="sheet" id="sheetInner" onclick="event.stopPropagation()"></div>
</div>
 
<script>
const MO=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MO_G=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WD=['пн','вт','ср','чт','пт','сб','вс'];
const PAL=['#E57373','#F06292','#BA68C8','#7986CB','#4DB6AC','#81C784','#FFB74D','#A1887F','#90A4AE','#64B5F6','#4DD0E1','#AED581'];
const CELL_H=52; // must match .dc height in CSS
const BAR_H=13;
const BAR_GAP=2;
const BAR_TOP_OFFSET=20; // below day number
 
function loadData(){
  try{const d=localStorage.getItem('mycal_v3');if(d)return JSON.parse(d);}catch(e){}
  return{events:[],cats:[
    {id:'study',name:'учёба',color:'#7986CB'},
    {id:'travel',name:'путешествие',color:'#4DB6AC'},
    {id:'work',name:'работа',color:'#F06292'},
    {id:'conf',name:'конференция',color:'#FFB74D'},
  ]};
}
function saveData(){try{localStorage.setItem('mycal_v3',JSON.stringify(S));}catch(e){}}
 
let S=loadData();
let curTab='cal',openCpId=null;
let selCat=null,selRepeat='none',selDow=[],mcOffset=0,pickStart=null,pickEnd=null,isMaybe=false,editId=null;
let renderedMonths=14;
 
function catById(id){return S.cats.find(c=>c.id===id)||{name:'?',color:'#aaa'};}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fdow(y,m){let d=new Date(y,m,1).getDay();return d===0?6:d-1;}
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function getOffsetYM(off){
  const now=new Date();let m=now.getMonth()+off,y=now.getFullYear();
  while(m<0){m+=12;y--;}while(m>11){m-=12;y++;}return{y,m};
}
 
function setTab(t){
  curTab=t;
  ['cal','list'].forEach(x=>document.getElementById('tb-'+x).className='tbtn'+(x===t?' on':''));
  document.getElementById('viewCal').style.display=t==='cal'?'':'none';
  document.getElementById('viewList').style.display=t==='list'?'':'none';
  if(t==='list')renderList();
}
 
function getMonthEvs(y,m){
  const res=[],tot=dim(y,m);
  S.events.forEach(ev=>{
    if(!ev.repeat||ev.repeat==='none'){
      if(ev.year===y&&ev.month===m)res.push({...ev});
    } else if(ev.repeat==='weekly'){
      const sd=new Date(ev.year,ev.month,ev.dayStart);
      for(let d=1;d<=tot;d++){
        const diff=(new Date(y,m,d)-sd)/86400000;
        if(diff>=0&&diff%7===0){res.push({...ev,year:y,month:m,dayStart:d,dayEnd:d,_v:true});break;}
      }
    } else if(ev.repeat==='monthly'){
      if(ev.dayStart<=tot)res.push({...ev,year:y,month:m,_v:true});
    } else if(ev.repeat==='custom'){
      const days=ev.repeatDow||[],hits=[];
      for(let d=1;d<=tot;d++){
        const dow=new Date(y,m,d).getDay(),idx=dow===0?6:dow-1;
        if(days.includes(idx)&&new Date(y,m,d)>=new Date(ev.year,ev.month,ev.dayStart))hits.push(d);
      }
      if(hits.length)res.push({...ev,year:y,month:m,dayStart:hits[0],dayEnd:hits[hits.length-1],_v:true,_hits:hits});
    }
  });
  return res;
}
 
function renderCalView(){
  const container=document.getElementById('viewCal');
  container.innerHTML='';
  for(let i=0;i<renderedMonths;i++){
    const{y,m}=getOffsetYM(i);
    container.appendChild(buildMonthBlock(y,m));
  }
  appendSentinel(container);
}
 
function buildMonthBlock(y,m){
  const now=new Date();
  const tot=dim(y,m),startWd=fdow(y,m);
  const evs=getMonthEvs(y,m);
 
  const block=document.createElement('div');
  block.className='month-block';
 
  const lbl=document.createElement('span');
  lbl.className='monlabel';
  lbl.textContent=MO[m]+' '+y;
  block.appendChild(lbl);
 
  const wdrow=document.createElement('div');
  wdrow.className='wdrow';
  WD.forEach(d=>{const x=document.createElement('div');x.className='wd';x.textContent=d;wdrow.appendChild(x);});
  block.appendChild(wdrow);
 
  // wrapper for grid + overlay
  const wrap=document.createElement('div');
  wrap.className='cal-wrap';
 
  const dgrid=document.createElement('div');
  dgrid.className='dgrid';
 
  // positions: col and row for each day (0-indexed)
  const dayPos={}; // day -> {col, row}
  let pos=startWd;
  for(let i=0;i<startWd;i++){const x=document.createElement('div');x.className='dc';dgrid.appendChild(x);}
  for(let d=1;d<=tot;d++){
    const cell=document.createElement('div');
    const isT=now.getDate()===d&&now.getMonth()===m&&now.getFullYear()===y;
    cell.className='dc'+(isT?' today':'');
    const numDiv=document.createElement('div');numDiv.className='dn';numDiv.textContent=d;cell.appendChild(numDiv);
    if(isT){const dot=document.createElement('div');dot.className='today-dot';cell.appendChild(dot);}
    cell.onclick=(()=>{const _d=d,_y=y,_m=m;return (evt)=>{
      if(evt.target.closest('.ev-bar-row'))return;
      const dayEvs=S.events.filter(e=>e.year===_y&&e.month===_m&&_d>=e.dayStart&&_d<=(e.dayEnd||e.dayStart));
      if(dayEvs.length===1){showPanel('edit',{id:dayEvs[0].id});}
      else if(dayEvs.length>1){showDaySheet(_y,_m,_d,dayEvs);}
      else{showPanel('add',{prefY:_y,prefM:_m,prefDay:_d});}
    };})();
    dgrid.appendChild(cell);
    dayPos[d]={col:pos%7,row:Math.floor(pos/7)};
    pos++;
  }
  wrap.appendChild(dgrid);
 
  // overlay for bars
  const overlay=document.createElement('div');
  overlay.className='bars-overlay';
  // We need the grid to be rendered to get cell width.
  // Use percentage-based positioning instead.
  // col width = 100/7 %, row height = CELL_H px
 
  // assign tracks (which vertical slot each event occupies per row)
  // Simple approach: sort events by start, assign slot greedily
  const sorted=[...evs].sort((a,b)=>a.dayStart-b.dayStart);
  // track occupancy: rowSlots[row][slot] = last day occupied
  const rowSlots={};
  function getSlot(startRow,endRow,startCol,endCol,startD,endD){
    // find a free slot across all rows this event spans
    for(let slot=0;slot<4;slot++){
      let free=true;
      for(let r=startRow;r<=endRow;r++){
        if(!rowSlots[r])rowSlots[r]=[];
        // check if slot occupied in this row overlapping our days
        if(rowSlots[r][slot]!==undefined&&rowSlots[r][slot]>=startD){free=false;break;}
      }
      if(free){
        for(let r=startRow;r<=endRow;r++){
          if(!rowSlots[r])rowSlots[r]=[];
          rowSlots[r][slot]=endD;
        }
        return slot;
      }
    }
    return 0;
  }
 
  sorted.forEach(ev=>{
    const cat=catById(ev.cat);
    const maybe=!!ev.maybe;
    const days=ev._hits||null;
    const segments=[];
 
    if(days){
      // custom repeat: each hit is its own single-day segment
      days.forEach(d=>{
        if(!dayPos[d])return;
        segments.push({startD:d,endD:d});
      });
    } else {
      const s=ev.dayStart,e=Math.min(ev.dayEnd||ev.dayStart,tot);
      // split into week rows
      let cur=s;
      while(cur<=e){
        const p=dayPos[cur];if(!p)break;
        const rowEnd=Math.min(e,cur+(6-p.col)); // last day in this row
        segments.push({startD:cur,endD:rowEnd});
        cur=rowEnd+1;
      }
    }
 
    segments.forEach(({startD,endD})=>{
      if(!dayPos[startD]||!dayPos[endD])return;
      const {row:startRow,col:startCol}=dayPos[startD];
      const {row:endRow,col:endCol}=dayPos[endD];
      const slot=getSlot(startRow,endRow,startCol,endCol,startD,endD);
 
      const bar=document.createElement('div');
      const isSingle=startD===endD;
      const isStart=startD===ev.dayStart||(ev._hits);
      const isEnd=endD===(ev.dayEnd||ev.dayStart)||(ev._hits);
      let cls='ev-bar-row';
      if(maybe)cls+=' maybe';
      else if(isSingle)cls+=' single';
      else if(isStart&&isEnd)cls+=' single';
      else if(isStart)cls+=' start';
      else if(isEnd)cls+=' end';
      else cls+=' mid';
      bar.className=cls;
 
      const cellW=100/7;
      const left=startCol*cellW;
      const right=(6-endCol)*cellW;
      const top=startRow*CELL_H+BAR_TOP_OFFSET+slot*(BAR_H+BAR_GAP);
 
      bar.style.left=left+'%';
      bar.style.right=right+'%';
      bar.style.top=top+'px';
      if(!maybe){
        bar.style.background=hexA(cat.color,0.25);
      }
      bar.style.color=cat.color;
      if(isStart||isSingle)bar.textContent=ev.name;
      if(!ev._v)bar.onclick=e=>{e.stopPropagation();showPanel('edit',{id:ev.id});};
      overlay.appendChild(bar);
    });
  });
  wrap.appendChild(overlay);
 
  // set grid height = rows * CELL_H
  const rows=Math.ceil((startWd+tot)/7);
  dgrid.style.height=(rows*CELL_H)+'px';
  dgrid.style.gridAutoRows=CELL_H+'px';
  overlay.style.height=(rows*CELL_H)+'px';
 
  block.appendChild(wrap);
 
  // pills
  if(evs.length){
    const strip=document.createElement('div');
    strip.className='ev-strip';
    [...evs].sort((a,b)=>a.dayStart-b.dayStart).forEach(ev=>{
      const cat=catById(ev.cat);
      const maybe=!!ev.maybe;
      const hasEnd=ev.dayEnd&&ev.dayEnd!==ev.dayStart;
      const dateStr=hasEnd?`${ev.dayStart}–${ev.dayEnd}`:String(ev.dayStart);
      const pill=document.createElement('div');
      pill.className='ev-pill'+(maybe?' maybe':'');
      pill.style.background=maybe?'transparent':hexA(cat.color,0.13);
      pill.style.color=cat.color;
      if(maybe)pill.style.border=`1px dashed ${cat.color}`;
      const dot=document.createElement('span');
      dot.style.cssText=`width:6px;height:6px;border-radius:50%;background:${cat.color};flex-shrink:0;display:inline-block${maybe?';opacity:0.5':''}`;
      pill.appendChild(dot);
      const txt=document.createElement('span');txt.textContent=' '+ev.name+' ';pill.appendChild(txt);
      const dt=document.createElement('span');dt.style.cssText='opacity:0.6;font-size:10px';dt.textContent=dateStr;pill.appendChild(dt);
      pill.onclick=()=>showPanel('edit',{id:ev.id});pill.style.cursor='pointer';
      strip.appendChild(pill);
    });
    block.appendChild(strip);
  }
  return block;
}
 
function appendSentinel(container){
  const s=document.createElement('div');s.id='sentinel';s.style.height='20px';container.appendChild(s);
  const obs=new IntersectionObserver(entries=>{
    if(!entries[0].isIntersecting)return;
    obs.disconnect();s.remove();
    const c=document.getElementById('viewCal');
    for(let i=renderedMonths;i<renderedMonths+3;i++){
      const{y,m}=getOffsetYM(i);c.appendChild(buildMonthBlock(y,m));
    }
    renderedMonths+=3;
    appendSentinel(c);
  },{rootMargin:'300px'});
  obs.observe(s);
}
 
function renderList(){
  const el=document.getElementById('evListAll');el.innerHTML='';
  if(!S.events.length){el.innerHTML='<div class="empty">событий пока нет</div>';return;}
  [...S.events].sort((a,b)=>a.year!==b.year?a.year-b.year:a.month!==b.month?a.month-b.month:a.dayStart-b.dayStart)
    .forEach(ev=>el.appendChild(makeRow(ev)));
}
 
function repLabel(ev){
  if(!ev.repeat||ev.repeat==='none')return '';
  if(ev.repeat==='weekly')return 'еженед.';
  if(ev.repeat==='monthly')return 'ежемес.';
  if(ev.repeat==='custom'&&ev.repeatDow)return ev.repeatDow.map(i=>WD[i]).join(', ');
  return '';
}
 
function makeRow(ev){
  const cat=catById(ev.cat);
  const y=ev.year,m=ev.month;
  const hasEnd=ev.dayEnd&&ev.dayEnd!==ev.dayStart;
  const dateStr=hasEnd?`${ev.dayStart}–${ev.dayEnd} ${MO_G[m]}`:`${ev.dayStart} ${MO_G[m]}`;
  const yr=y!==new Date().getFullYear()?` ${y}`:'';
  const rl=repLabel(ev);
  const row=document.createElement('div');row.className='ev-row';
  row.innerHTML=`<div class="ev-col" style="background:${cat.color}${ev.maybe?';opacity:0.5':''}"></div>
    <div class="ev-body">
      <div class="ev-nm">${ev.name}${ev.maybe?'<span class="maybe-badge">возможно</span>':''}${rl?`<span class="badge">${rl}</span>`:''}</div>
      <div class="ev-mt">${cat.name} · ${dateStr}${yr}</div>
    </div>
    <button class="ev-del" onclick="showPanel('edit',{id:${ev.id}})">&#8943;</button>`;
  return row;
}
 
function delEv(id){S.events=S.events.filter(e=>e.id!==id);saveData();if(curTab==='cal')renderCalView();else renderList();}
 
function showDaySheet(y,m,d,evs){
  const sh=document.getElementById('sheetInner');
  const dayLabel=`${d} ${MO_G[m]}`;
  let html=`<div class="handle"></div><div class="sh-title">${dayLabel}</div>`;
  evs.forEach(ev=>{
    const cat=catById(ev.cat);
    const maybe=!!ev.maybe;
    const hasEnd=ev.dayEnd&&ev.dayEnd!==ev.dayStart;
    const dateStr=hasEnd?`${ev.dayStart}–${ev.dayEnd}`:'';
    html+=`<div class="ev-row" style="cursor:pointer" onclick="showPanel('edit',{id:${ev.id}})">
      <div class="ev-col" style="background:${cat.color}${maybe?';opacity:0.5':''}"></div>
      <div class="ev-body">
        <div class="ev-nm">${ev.name}${maybe?'<span class="maybe-badge">возможно</span>':''}</div>
        <div class="ev-mt">${cat.name}${dateStr?' · '+dateStr:''}</div>
      </div>
      <div style="color:var(--text3);font-size:13px;padding:0 4px;">›</div>
    </div>`;
  });
  html+=`<div class="mbtns"><button class="bsave" onclick="showPanel('add',{prefY:${y},prefM:${m},prefDay:${d}})">+ добавить событие</button></div>`;
  sh.innerHTML=html;
  document.getElementById('overlay').style.display='flex';
}
 
function overlayClick(e){if(e.target===document.getElementById('overlay'))closePanel();}
function closePanel(){document.getElementById('overlay').style.display='none';}
 
function showPanel(type,opts){
  opts=opts||{};
  const sh=document.getElementById('sheetInner');
  if(type==='add'){
    editId=null;
    selCat=S.cats[0]?.id;selRepeat='none';selDow=[];pickStart=null;pickEnd=null;isMaybe=false;
    const now=new Date();
    const baseY=opts.prefY||now.getFullYear();
    const baseM=opts.prefM!==undefined?opts.prefM:now.getMonth();
    mcOffset=0;
    if(opts.prefDay!==undefined)pickStart={y:baseY,m:baseM,d:opts.prefDay};
    sh.innerHTML=buildAddSheet();renderMiniCal();
    setTimeout(()=>{const el=document.getElementById('evN');if(el)el.focus();},300);
  } else if(type==='edit'){
    const ev=S.events.find(e=>e.id===opts.id);
    if(!ev)return;
    editId=ev.id;
    selCat=ev.cat;
    selRepeat=ev.repeat||'none';
    selDow=[...(ev.repeatDow||[])];
    isMaybe=!!ev.maybe;
    pickStart={y:ev.year,m:ev.month,d:ev.dayStart};
    pickEnd=(ev.dayEnd&&ev.dayEnd!==ev.dayStart)?{y:ev.year,m:ev.month,d:ev.dayEnd}:null;
    const now2=new Date();
    mcOffset=(ev.year-now2.getFullYear())*12+(ev.month-now2.getMonth());
    sh.innerHTML=buildAddSheet(ev.name);renderMiniCal();
    // restore dow pill colors without toggling
    if(selRepeat==='custom'){
      WD.forEach((_,j)=>{
        const el=document.getElementById('dp'+j);if(!el)return;
        const on=selDow.includes(j),c=catById(selCat);
        el.className='dow-pill'+(on?' on':'');
        el.style.color=on?c.color:'';el.style.background=on?hexA(c.color,0.15):'';el.style.borderColor=on?c.color:'';
      });
    }
    setTimeout(()=>{const el=document.getElementById('evN');if(el)el.focus();},300);
  } else if(type==='cats'){
    openCpId=null;sh.innerHTML=buildCatsSheet();
  }
  document.getElementById('overlay').style.display='flex';
}
 
function buildAddSheet(prefName){
  const isEdit=!!editId;
  return `<div class="handle"></div>
  <div class="sh-title">${isEdit?'редактировать':'новое событие'}</div>
  <div class="fg"><label class="fl">название</label><input class="finput" type="text" id="evN" placeholder="например, конференция" autocomplete="off" value="${prefName?prefName.replace(/"/g,'&quot;'):''}"/></div>
  <div class="fg">
    <label class="fl">дата</label>
    <div class="mini-cal" id="miniCal"></div>
    <div class="date-display" id="dateDisp"></div>
  </div>
  <div class="fg"><label class="fl">категория</label><div class="chips" id="catChips">${buildChips()}</div></div>
  <div class="fg">
    <label class="fl">повтор</label>
    <div class="rrow">
      ${['none','weekly','monthly','custom'].map(r=>`<button class="ropt${r===selRepeat?' on':''}" id="ropt-${r}" onclick="pickRepeat('${r}')">${{none:'без',weekly:'еженед.',monthly:'ежемес.',custom:'свой'}[r]}</button>`).join('')}
    </div>
    <div id="dowRow" style="display:${selRepeat==='custom'?'block':'none'};"><div class="dow-pills">${WD.map((d,i)=>`<button class="dow-pill${selDow.includes(i)?' on':''}" id="dp${i}" onclick="toggleDow(${i})">${d}</button>`).join('')}</div></div>
  </div>
  <div class="toggle-row">
    <div><div class="toggle-label">возможное событие</div><div class="toggle-sub">точная дата не известна</div></div>
    <button class="toggle${isMaybe?' on':''}" id="maybeToggle" onclick="toggleMaybe()"></button>
  </div>
  <div class="mbtns">
    ${isEdit?`<button class="bdanger" onclick="delEvAndClose(${editId})">удалить</button><button class="bcancel" onclick="closePanel()">отмена</button>`:`<button class="bcancel" onclick="closePanel()">отмена</button>`}
    <button class="bsave" onclick="saveEv()">${isEdit?'сохранить':'сохранить'}</button>
  </div>`;
}
 
function toggleMaybe(){isMaybe=!isMaybe;const b=document.getElementById('maybeToggle');if(b)b.className='toggle'+(isMaybe?' on':'');}
 
function renderMiniCal(){
  const now=new Date();
  const base=pickStart?{y:pickStart.y,m:pickStart.m}:{y:now.getFullYear(),m:now.getMonth()};
  let mo=base.y*12+base.m+mcOffset;
  let cy=Math.floor(mo/12),cm=((mo%12)+12)%12;
  if(cm<0){cm+=12;cy--;}
  const tot=dim(cy,cm),start=fdow(cy,cm);
  const c=catById(selCat);
  let h=`<div class="mc-nav"><button class="mc-arr" onclick="mcNav(-1)">&#8249;</button><span class="mc-lbl">${MO[cm]} ${cy}</span><button class="mc-arr" onclick="mcNav(1)">&#8250;</button></div>
  <div class="mc-wd">${WD.map(d=>`<div class="mc-wdc">${d}</div>`).join('')}</div>
  <div class="mc-days">`;
  for(let i=0;i<start;i++)h+=`<div class="mc-d empty"></div>`;
  for(let d=1;d<=tot;d++){
    const isT=now.getDate()===d&&now.getMonth()===cm&&now.getFullYear()===cy;
    const sel=isSel(cy,cm,d),inR=isInRange(cy,cm,d);
    let st='';
    if(sel)st=`style="background:${c.color}"`;
    else if(inR)st=`style="background:${hexA(c.color,0.18)}"`;
    h+=`<div class="mc-d${isT&&!sel?' today-d':''}${sel?' sel':''}" ${st} onclick="pickDay(${cy},${cm},${d})">${d}</div>`;
  }
  h+=`</div>`;
  const mc=document.getElementById('miniCal');if(mc)mc.innerHTML=h;
  updateDateDisp();
}
function isSel(y,m,d){return (pickStart&&pickStart.y===y&&pickStart.m===m&&pickStart.d===d)||(pickEnd&&pickEnd.y===y&&pickEnd.m===m&&pickEnd.d===d);}
function isInRange(y,m,d){
  if(!pickStart||!pickEnd)return false;
  const tc=new Date(y,m,d).getTime();
  return tc>new Date(pickStart.y,pickStart.m,pickStart.d).getTime()&&tc<new Date(pickEnd.y,pickEnd.m,pickEnd.d).getTime();
}
function pickDay(y,m,d){
  if(!pickStart||pickEnd){pickStart={y,m,d};pickEnd=null;}
  else{
    const ts=new Date(pickStart.y,pickStart.m,pickStart.d).getTime(),tc=new Date(y,m,d).getTime();
    if(tc<ts){pickStart={y,m,d};pickEnd=null;}
    else if(tc===ts)pickEnd=null;
    else pickEnd={y,m,d};
  }
  renderMiniCal();
}
function mcNav(d){mcOffset+=d;renderMiniCal();}
function updateDateDisp(){
  const el=document.getElementById('dateDisp');if(!el)return;
  if(!pickStart){el.textContent='выбери день или диапазон';return;}
  const fmt=p=>`${p.d} ${MO_G[p.m]}${p.y!==new Date().getFullYear()?' '+p.y:''}`;
  el.textContent=pickEnd?`${fmt(pickStart)} — ${fmt(pickEnd)}`:fmt(pickStart);
}
function buildChips(){
  return S.cats.map(c=>`<div class="chip" style="background:${hexA(c.color,c.id===selCat?0.22:0.08)};color:${c.color};border-color:${c.id===selCat?c.color:'transparent'}" onclick="pickCat('${c.id}')">${c.name}</div>`).join('');
}
function pickCat(id){selCat=id;const el=document.getElementById('catChips');if(el)el.innerHTML=buildChips();renderMiniCal();}
function pickRepeat(r){
  selRepeat=r;
  ['none','weekly','monthly','custom'].forEach(x=>{const el=document.getElementById('ropt-'+x);if(el)el.className='ropt'+(x===r?' on':'');});
  const dr=document.getElementById('dowRow');if(dr)dr.style.display=r==='custom'?'block':'none';
}
function toggleDow(i){
  const idx=selDow.indexOf(i);if(idx===-1)selDow.push(i);else selDow.splice(idx,1);
  WD.forEach((_,j)=>{
    const el=document.getElementById('dp'+j);if(!el)return;
    const on=selDow.includes(j),c=catById(selCat);
    el.className='dow-pill'+(on?' on':'');
    el.style.color=on?c.color:'';el.style.background=on?hexA(c.color,0.15):'';el.style.borderColor=on?c.color:'';
  });
}
function saveEv(){
  const name=document.getElementById('evN').value.trim();
  if(!name||!pickStart)return;
  const ds=pickStart.d,y=pickStart.y,m=pickStart.m;
  const de=pickEnd?(pickEnd.y===y&&pickEnd.m===m?pickEnd.d:pickStart.d):pickStart.d;
  const repeat=selRepeat==='custom'&&selDow.length?'custom':selRepeat==='custom'?'none':selRepeat;
  if(editId){
    const idx=S.events.findIndex(e=>e.id===editId);
    if(idx!==-1)S.events[idx]={...S.events[idx],name,year:y,month:m,dayStart:ds,dayEnd:de,cat:selCat||S.cats[0]?.id,repeat,repeatDow:[...selDow],maybe:isMaybe};
  } else {
    S.events.push({id:Date.now(),name,year:y,month:m,dayStart:ds,dayEnd:de,cat:selCat||S.cats[0]?.id,repeat,repeatDow:[...selDow],maybe:isMaybe});
  }
  saveData();closePanel();renderCalView();
}
function delEvAndClose(id){
  S.events=S.events.filter(e=>e.id!==id);
  saveData();closePanel();renderCalView();
}
 
function buildCatsSheet(){
  return `<div class="handle"></div><div class="sh-title">категории</div>
  <div id="catMgr">${buildCatRows()}</div>
  <button class="addcatbtn" onclick="addCat()">+ новая категория</button>
  <div class="mbtns" style="margin-top:1rem;"><button class="bsave" onclick="closePanel();renderCalView()">готово</button></div>`;
}
function buildCatRows(){
  return S.cats.map(c=>`
    <div class="cat-mgr-row">
      <div class="cswatch${openCpId===c.id?' open':''}" style="background:${c.color}" onclick="toggleCp('${c.id}')"></div>
      <input class="cname" value="${c.name}" onchange="renameCat('${c.id}',this.value)"/>
      <button class="cdel" onclick="delCat('${c.id}')">×</button>
    </div>
    <div class="cprow" id="cp-${c.id}" style="display:${openCpId===c.id?'flex':'none'}">
      ${PAL.map(col=>`<div class="cpdot${col===c.color?' on':''}" style="background:${col}" onclick="setCatCol('${c.id}','${col}')"></div>`).join('')}
    </div>`).join('');
}
function toggleCp(id){openCpId=openCpId===id?null:id;refreshCatMgr();}
function setCatCol(id,col){const c=S.cats.find(x=>x.id===id);if(c){c.color=col;saveData();}refreshCatMgr();}
function renameCat(id,name){const c=S.cats.find(x=>x.id===id);if(c){c.name=name;saveData();}}
function delCat(id){S.cats=S.cats.filter(c=>c.id!==id);saveData();refreshCatMgr();}
function addCat(){S.cats.push({id:'c'+Date.now(),name:'новая',color:PAL[S.cats.length%PAL.length]});saveData();refreshCatMgr();}
function refreshCatMgr(){const el=document.getElementById('catMgr');if(el)el.innerHTML=buildCatRows();}
 
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
renderCalView();
</script>
</body>
</html>
